<div class="min-h-screen bg-white text-jw-text flex flex-col transition-colors duration-300">
  
  <!-- Modern Header — Apple-style (Only visible when authenticated) -->
  <header *ngIf="isAuthenticated" class="w-full backdrop-blur-xl bg-jw-bg/80 border-b border-jw-border-light sticky top-0 z-50 animate-fade-in">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <!-- Logo/Brand -->
      <div class="flex items-center space-x-3 cursor-pointer select-none" routerLink="/planificador">
        <div class="h-8 w-8 bg-jw-accent rounded-xl flex items-center justify-center text-white shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" viewBox="0 0 20 20" fill="currentColor">
            <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" />
            <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" />
          </svg>
        </div>
        <span class="font-semibold text-base tracking-tight text-jw-text">
          Listas VMC
        </span>
      </div>

      <!-- Navigation Tabs -->
      <nav class="flex items-center space-x-1 bg-jw-card p-1 rounded-xl border border-jw-border-light">
        <button
          type="button"
          routerLink="/planificador"
          routerLinkActive="bg-white shadow-sm text-jw-text"
          [routerLinkActiveOptions]="{exact: true}"
          class="px-4 py-1.5 rounded-lg text-xs font-semibold text-jw-text-secondary hover:text-jw-text transition-all cursor-pointer"
        >
          Planificador VMC
        </button>
        <button
          type="button"
          routerLink="/participantes"
          routerLinkActive="bg-white shadow-sm text-jw-text"
          class="px-4 py-1.5 rounded-lg text-xs font-semibold text-jw-text-secondary hover:text-jw-text transition-all cursor-pointer"
        >
          Participantes
        </button>
      </nav>

      <!-- Logout Action -->
      <div class="flex items-center space-x-3">
        <button
          type="button"
          (click)="logout()"
          class="px-3.5 py-1.5 border border-jw-border bg-jw-card hover:bg-red-50 hover:text-red-600 hover:border-red-200 text-jw-text-secondary font-semibold text-xs rounded-xl transition-all cursor-pointer flex items-center space-x-1.5"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          <span class="hidden sm:inline">Cerrar Sesión</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-10 flex flex-col justify-center">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <footer class="py-6 border-t border-jw-border-light bg-jw-bg">
    <div class="max-w-6xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between text-xs text-jw-text-secondary font-medium">
      <p>© 2026 Listas VMC. Todos los derechos reservados.</p>
    </div>
  </footer>

</div>
