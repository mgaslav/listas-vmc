<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-3xl border border-jw-border-light shadow-xl">
    
    <!-- Branding Header -->
    <div class="text-center space-y-3">
      <div class="mx-auto h-12 w-12 bg-jw-accent rounded-2xl flex items-center justify-center text-white shadow-md shadow-jw-accent/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h2 class="text-3xl font-bold tracking-tight text-jw-text">
        Iniciar Sesión
      </h2>
      <p class="text-sm text-jw-text-secondary font-medium">
        Accede para administrar tus Listas VMC
      </p>
    </div>

    <!-- Error Alert Banner -->
    <div
      *ngIf="errorMessage"
      class="flex items-center space-x-2.5 p-4 bg-red-50 border border-red-200 text-red-700 rounded-2xl text-xs text-left animate-fade-in"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <!-- Login Form -->
    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        
        <!-- Email Input -->
        <div class="space-y-1.5 text-left">
          <label for="email" class="text-xs font-semibold text-jw-text-secondary">Correo Electrónico</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="ejemplo@correo.com"
            class="w-full bg-white border border-jw-border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-jw-accent/30 focus:border-jw-accent transition-all font-medium text-jw-text placeholder-jw-text-secondary/40"
            [class.border-red-300]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          />
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-[10px] text-red-500 font-semibold mt-1">
            Por favor ingresa un correo válido.
          </div>
        </div>

        <!-- Password Input -->
        <div class="space-y-1.5 text-left">
          <label for="password" class="text-xs font-semibold text-jw-text-secondary">Contraseña</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
            class="w-full bg-white border border-jw-border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-jw-accent/30 focus:border-jw-accent transition-all font-medium text-jw-text placeholder-jw-text-secondary/40"
            [class.border-red-300]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-[10px] text-red-500 font-semibold mt-1">
            La contraseña debe tener al menos 6 caracteres.
          </div>
        </div>

      </div>

      <!-- Submit Button -->
      <div>
        <button
          type="submit"
          [disabled]="loginForm.invalid || isLoading"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-2xl text-white bg-jw-accent hover:bg-jw-accent-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-jw-accent transition-all shadow-md shadow-jw-accent/15 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span *ngIf="isLoading" class="absolute left-0 inset-y-0 flex items-center pl-3">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </span>
          {{ isLoading ? 'Iniciando sesión...' : 'Ingresar' }}
        </button>
      </div>

    </form>
  </div>
</div>
