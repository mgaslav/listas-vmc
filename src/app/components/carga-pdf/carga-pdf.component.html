<div class="w-full max-w-2xl mx-auto">
  <div
    class="relative border-2 border-dashed rounded-3xl p-8 text-center transition-all duration-300 bg-jw-card/50 border-jw-border"
    [class.border-jw-accent]="dragOver"
    [class.ring-4]="dragOver"
    [class.ring-jw-accent/20]="dragOver"
    [class.scale-[1.01]]="dragOver"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <!-- Hidden input -->
    <input
      type="file"
      id="fileInput"
      class="hidden"
      accept=".pdf"
      (change)="onFileChange($event)"
    />

    <div *ngIf="!selectedFile; else filePreview" class="flex flex-col items-center justify-center space-y-4 py-6">
      <div class="p-4 bg-white border border-jw-border-light text-jw-accent rounded-2xl shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
      </div>
      <div>
        <label for="fileInput" class="cursor-pointer text-base font-semibold text-jw-accent hover:text-jw-accent-hover transition-colors">
          Carga un archivo
        </label>
        <span class="text-jw-text-secondary font-medium"> o arrástralo y suéltalo aquí</span>
      </div>
      <p class="text-xs text-jw-text-secondary">
        Únicamente archivos PDF de la Guía de Actividades de la reunión VMC (máx. 10MB)
      </p>
    </div>

    <!-- File selection preview -->
    <ng-template #filePreview>
      <div class="flex flex-col items-center justify-center space-y-6 py-4">
        <div class="relative flex items-center p-4 bg-white border border-jw-border-light rounded-2xl w-full max-w-md shadow-sm">
          <!-- PDF icon -->
          <div class="p-3 bg-red-50 text-red-500 border border-red-200 rounded-xl mr-4 flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
          </div>
          <!-- File Details -->
          <div class="text-left flex-1 min-w-0">
            <p class="text-sm font-semibold text-jw-text truncate">
              {{ selectedFile?.name }}
            </p>
            <p class="text-xs text-jw-text-secondary font-mono">
              {{ formatBytes(selectedFile?.size || 0) }}
            </p>
          </div>
          <!-- Remove button -->
          <button
            type="button"
            (click)="removeFile()"
            class="p-2 hover:bg-gray-100 text-jw-text-secondary hover:text-jw-text rounded-xl transition-all cursor-pointer"
            title="Quitar archivo"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <!-- Action Button -->
        <button
          type="button"
          (click)="triggerUpload()"
          class="relative group overflow-hidden px-8 py-3.5 bg-jw-accent text-white rounded-2xl font-semibold text-sm shadow-md shadow-jw-accent/20 hover:shadow-lg hover:shadow-jw-accent/30 hover:bg-jw-accent-hover hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 cursor-pointer"
        >
          <span class="flex items-center justify-center space-x-2">
            <span>Analizar</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </span>
        </button>
      </div>
    </ng-template>
  </div>

  <!-- Error feedback message -->
  <div
    *ngIf="errorMessage"
    class="mt-4 flex items-center space-x-2 p-4 bg-red-50 border border-red-200 text-red-700 rounded-2xl text-sm"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <span class="font-medium">{{ errorMessage }}</span>
  </div>
</div>
